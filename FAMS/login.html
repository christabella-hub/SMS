<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body>

<div class="container">
  <div class="card">

    <!-- LEFT -->
    <div class="login">
      <h1>Welcome back!</h1>
      <p class="subtitle">
        Simplify your workflow and boost your productivity<br>
        with FAWE Assets Management App. Get started for free.
      </p>

      <div class="input-group">
        <input type="text" placeholder="Username">
      </div>

      <div class="input-group password">
        <input type="password" placeholder="Password">
        <span class="eye">👁</span>
      </div>

      <a href="#" class="forgot">Forgot Password?</a>

      <button class="login-btn">Login</button>

      <div class="divider">
        <span>or continue with</span>
      </div>

      <div class="socials">
        <div class="social">G</div>
             <div class="social">f</div>
      </div>

      <p class="register">
        Not a member? <a href="signup.html">Register now</a>
      </p>
    </div>

    <!-- RIGHT -->
    <div class="illustration">
      <img src="fawe.png"
           alt="Illustration">
      <p>
        Make your work easier and organized<br>
        with FAWE Asset Management App
      </p>
    </div>

  </div>
</div>

</body>
</html>
