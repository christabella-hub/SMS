       <div class="layout">
    <aside class="sidebar">

      <img class="logo" src="logo.png" >

      </div>
      <nav class="nav">

 <main class="main-content">
    <h2 class="headings" style="margin-top:10px;">📃 Student Management</h2>
    <div class="student">
        <form>
            <input class="search" type="search" placeholder="Search for a student">
        </form>

    </div>
    <h2 class="headings">👥 Student Records</h2>
    <div class="students-table">

    </div>

    <h2 class="headings">📚 Academic Performance Overview</h2>

    <div class="card">
        <div class="card-top">
         <label for="school-average-grade">School Average Grade</label>
         <div class="icon-box red">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <!-- Axes -->
                 <path d="M3 3v18h18"></path>
  
                 <!-- Bars -->
                 <rect x="7" y="13" width="3" height="5"></rect>
                 <rect x="12" y="10" width="3" height="8"></rect>
                 <rect x="17" y="6" width="3" height="12"></rect>
            </svg>
         </div>
        </div>
        <h1 id="school-average-grade" class="number">76.3%</h1>
        <p class="trend-positive">↑ 5.1%</p><br>
          <span class="timeline-text">Last Term</span>

     <div class="card-top">
         <label for="awarded-students">Awarded Students</label>
         <div class="icon-box red">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <!-- Axes -->
                 <path d="M3 3v18h18"></path>
  
                 <!-- Bars -->
                 <rect x="7" y="13" width="3" height="5"></rect>
                 <rect x="12" y="10" width="3" height="8"></rect>
                 <rect x="17" y="6" width="3" height="12"></rect>
            </svg>
         </div>
        </div>
        <h1 id="awarded-students" class="number">12</h1>
        <p class="trend-positive">↑ 5 more</p><br>
          <span class="timeline-text">This Term</span>
    </div>
