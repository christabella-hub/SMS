 <main class="main-content">

  <h1 class="title">School Management Dashboard</h1>
  <p class="subtitle">Welcome back, Admin</p>

  <h2 class="section-title">📊 Overview Metrics</h2>

  <div class="cards">

    <!-- Students Card -->
<div class="card students">
  <div class="card-top">
    <label for="total-students">Total Students</label>

    <div class="icon-box">
      <!-- Student Icon -->
      <svg viewBox="0 0 24 24" fill="none" stroke="red" stroke-width="2">
        <circle cx="12" cy="12" r="10"></circle>
        <circle cx="12" cy="10" r="3"></circle>
        <path d="M8 17c1.5-2 6.5-2 8 0"></path>
      </svg>
    </div>
  </div>

  <h1 id="total-students" class="number">1,247</h1>
  <p class="trend positive">↑ 23 new</p><br>
  <span class="timeline-text">This Term</span>
</div>



   <!-- Discipline Card -->
<div class="card discipline">
  <div class="card-top">
    <label for="discipline-cases">Active Discipline Cases</label>

    <div class="icon-box red">
      <svg viewBox="0 0 24 24" fill="none" stroke="red" stroke-width="2">
        <path d="M12 2l7 4v6c0 5-3.5 8-7 10-3.5-2-7-5-7-10V6l7-4z"></path>
      </svg>
    </div>
  </div>

  <h1 id="discipline-cases" class="number">8</h1>
  <p class="trend negative">↓ 3 new cases</p><br>
  <span class="timeline-text">This Week</span>
</div>



    <!-- Attendance Card -->
  <div class="card attendance">
  <div class="card-top">
    <label for="attendance-rate">Attendance Rate</label>

    <div class="icon-box green">
      <svg viewBox="0 0 24 24" fill="none" stroke="red" stroke-width="2">
        <rect x="3" y="4" width="18" height="18" rx="2"></rect>
        <path d="M9 14l2 2 4-4"></path>
      </svg>
    </div>
  </div>

  <h1 id="attendance-rate" class="number">94.7%</h1>
  <p class="trend positive">↑ 2.3% </p><br>
  <span class="timeline-text">Last Month</span>
</div>


  </div>

  </div>
