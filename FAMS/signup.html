<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sign Up</title>
  <link rel="stylesheet" href="signup.css" />
</head>
<body>

<div class="container">
  <div class="card">

   
    <div class="auth">
      <h1>Create account</h1>
      <p class="subtitle">
        Start managing your assets efficiently<br>
        with FAWE Assets Management App.
      </p>

      <input type="text" placeholder="Full Name">
      <input type="email" placeholder="Email Address">
      <input type="text" placeholder="Username">
      <input type="text" placeholder="Delegation">

      <div class="password-field">
        <input type="password" placeholder="Password">
        <span class="eye">👁</span>
      </div>

      <div class="password-field">
        <input type="password" placeholder="Confirm Password">
        <span class="eye">👁</span>
      </div>

      <button class="primary-btn">Create Account</button>

      <div class="divider">or sign up with</div>

      <div class="socials">
        <div class="social">G</div>
        <div class="social">f</div>
      </div>

      <p class="switch">
        Already have an account? <a href="login.html">Login</a>
      </p>
    </div>

   
    <div class="brand">
      <img src="fawe.png" alt="FAWE Logo">
      <p>
        Make your work easier and organized<br>
        with FAWE Asset Management App
      </p>
    </div>

  </div>
</div>

</body>
</html>
